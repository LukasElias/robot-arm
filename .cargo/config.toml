[target.thumbv7em-none-eabihf]
runner = "probe-rs run --chip nRF52833_xxAA --protocol swd"
rustflags = [
  "-C", "linker=flip-link",
  "-C", "link-arg=-Tlink.x",
  "-C", "link-arg=-Tdefmt.x",
]

# Automatically select this target when cargo building this project
[build]
target = "thumbv7em-none-eabihf"

[env]
DEFMT_LOG = "info"
